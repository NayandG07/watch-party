[alembic]
# Path to the alembic migration scripts directory
script_location = alembic

# Add the project root to sys.path so `app` can be imported in env.py
prepend_sys_path = .

# Use OS-native path separator in version filenames
version_path_separator = os

# The database URL is set programmatically in alembic/env.py
# from pydantic-settings (reads .env automatically).
# Do NOT set sqlalchemy.url here.
sqlalchemy.url =

[post_write_hooks]
# Optionally auto-format new migration files:
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
