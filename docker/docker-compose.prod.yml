# ═══════════════════════════════════════════════════════════════
#  Watch Party — Docker Compose (Production Override)
#
#  Usage:
#    docker compose \
#      -f docker/docker-compose.yml \
#      -f docker/docker-compose.prod.yml \
#      up -d
#
#  Differences from dev:
#    - No hot-reload
#    - LOG_FORMAT=json (for log aggregators)
#    - No source volume mount
#    - Restart policy: always
# ═══════════════════════════════════════════════════════════════

services:
  backend:
    image: watchparty-backend:latest
    container_name: watchparty-backend
    environment:
      ENVIRONMENT: production
      LOG_FORMAT: json
    # Remove the dev hot-reload volume and command overrides
    volumes: []
    command:
      [
        "python", "-m", "uvicorn", "app.main:app",
        "--host", "0.0.0.0", "--port", "8000",
        "--workers", "1"
      ]
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
